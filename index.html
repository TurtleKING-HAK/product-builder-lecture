<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Number Recommender</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body data-theme="light">
  <div class="theme-selector">
    <button class="theme-btn" style="background-color: #f8f9fa; color: #212529; border: 1px solid #ddd;" onclick="setTheme('light')">White</button>
    <button class="theme-btn" style="background-color: #121212; color: #e0e0e0;" onclick="setTheme('dark')">Dark</button>
    <button class="theme-btn" style="background-color: #fffde7; color: #5d4037; border: 1px solid #e1e1e1;" onclick="setTheme('yellow')">Yellow</button>
  </div>

  <div class="container">
    <h1>Lotto Number Generator</h1>
    <p>행운의 번호를 확인해보세요!</p>
    
    <div id="lotto-numbers" class="lotto-container">
      <!-- 로또 공들이 여기에 생성됩니다 -->
    </div>

    <button id="generate-btn" class="action-btn">번호 생성하기</button>

    <hr style="margin: 3rem 0; border: 0; border-top: 1px solid #eee; opacity: 0.5;">

    <div class="contact-section">
      <h3>🤝 제휴 및 서비스 문의</h3>
      <form action="https://formspree.io/f/xeelrvov" method="POST" class="contact-form">
        <div class="form-group">
          <label for="email">이메일 주소</label>
          <input type="email" id="email" name="email" placeholder="example@email.com" required>
        </div>
        <div class="form-group">
          <label for="message">문의 내용</label>
          <textarea id="message" name="message" rows="4" placeholder="문의하실 내용을 입력해주세요." required></textarea>
        </div>
        <button type="submit" class="action-btn" style="width: 100%; margin-top: 1rem;">문의 보내기</button>
      </form>
    </div>
  </div>

  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
